name: Playwright E2E + Allure

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # 08:00, 12:00 e 18:00 America/Sao_Paulo (UTC−3) → 11:00, 15:00 e 21:00 UTC
    - cron: "0 11 * * *"
    - cron: "0 15 * * *"
    - cron: "0 21 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Ensure Maven Wrapper is executable
        run: chmod +x mvnw

      - name: Download dependencies
        run: ./mvnw -B -q dependency:go-offline

      - name: Install Playwright browsers
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers
        run: ./mvnw -B -q exec:java

      - name: Run tests
        env:
          BROWSER: ${{ matrix.browser }}
          CI: true
          HEADLESS: "true"
          ATTACH_EVIDENCE: "true"
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers
        run: ./mvnw -B clean test

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results
          retention-days: 30
          if-no-files-found: warn

  allure-publish:
    needs: test
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Ensure Maven Wrapper is executable
        run: chmod +x mvnw

      - name: Download Allure raw results (all browsers)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: allure-results-*
          path: target/allure-results
          merge-multiple: true

      - name: Checkout previous gh-pages content
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        continue-on-error: true
        with:
          ref: gh-pages
          path: .gh-pages

      - name: Reuse Allure history from previous publication
        shell: bash
        run: |
          mkdir -p target/allure-results
          if [ -d ".gh-pages/history" ]; then
            mkdir -p target/allure-results/history
            cp -R .gh-pages/history/. target/allure-results/history/
          fi

      - name: Generate consolidated Allure report
        run: ./mvnw -B allure:report

      - name: Prepare Pages content (latest + per-run snapshot)
        shell: bash
        run: |
          rm -rf .pages
          mkdir -p .pages
          cp -R target/site/allure-maven-plugin/. .pages/
          mkdir -p ".pages/runs/${{ github.run_number }}"
          cp -R target/site/allure-maven-plugin/. ".pages/runs/${{ github.run_number }}/"

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@47f197a2200bb9de68ba5f48fad1c088eb1c4a32 # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .pages
          keep_files: true
          commit_message: "publicação: relatório Allure (execução ${{ github.run_number }})"
